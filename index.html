  <meta charset="UTF-8">

  <style>
    :root {
      --bg: #0f1724;
      --bg-card: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.12);
      --text: #f4f7fb;
      --muted: #a8b4c4;
      --accent: #3d8f5a;
      --accent-soft: rgba(61, 143, 90, 0.18);
      --radius: 16px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
    }

    a { color: #7ec99a; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 64px;
    }

    .lang-picker {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 24px;
    }

    .lang-picker button {
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .lang-picker button:hover {
      color: var(--text);
      border-color: rgba(61, 143, 90, 0.45);
    }

    .lang-picker button.is-active {
      background: var(--accent-soft);
      border-color: rgba(61, 143, 90, 0.55);
      color: #b8e6c8;
      font-weight: 600;
    }

    .hero {
      text-align: center;
      padding: 32px 0 40px;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      margin: 0 0 12px;
      letter-spacing: -0.02em;
    }

    .hero .tagline {
      font-size: 1.15rem;
      color: var(--muted);
      max-width: 540px;
      margin: 0 auto;
    }

    .hero .pill {
      display: inline-block;
      margin-top: 20px;
      padding: 8px 16px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(61, 143, 90, 0.35);
      color: #b8e6c8;
      font-size: 0.9rem;
    }

    section { margin-top: 48px; }

    section h2 {
      font-size: 1.35rem;
      margin: 0 0 8px;
    }

    section .sub {
      color: var(--muted);
      margin: 0 0 24px;
      font-size: 0.95rem;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .video-slot {
      aspect-ratio: 16 / 9;
      border-radius: var(--radius);
      border: 2px dashed var(--border);
      background: var(--bg-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      min-height: 180px;
    }

    .video-slot.has-video {
      border-style: solid;
      padding: 0;
      overflow: hidden;
      cursor: zoom-in;
    }

    .video-slot iframe,
    .video-slot video {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .video-slot .placeholder-icon {
      font-size: 2rem;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    .video-slot .placeholder-label {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .video-slot .placeholder-hint {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 8px;
      opacity: 0.7;
      max-width: 240px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
      justify-items: center;
    }

    @media (min-width: 900px) {
      .gallery {
        grid-template-columns: repeat(4, 220px);
        justify-content: center;
      }
    }

    .shot {
      width: 100%;
      max-width: 220px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.2s ease;
    }

    .shot:hover { transform: translateY(-3px); }

    .shot img {
      width: 100%;
      height: auto;
      display: block;
      cursor: zoom-in;
    }

    .shot figcaption {
      padding: 10px 12px 12px;
      font-size: 0.82rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    .shot figcaption strong {
      display: block;
      color: var(--text);
      font-size: 0.88rem;
      margin-bottom: 2px;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 32px;
    }

    .feature {
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      font-size: 0.92rem;
    }

    .feature span { margin-right: 6px; }

    .hero-guide-link {
      display: inline-block;
      margin-top: 16px;
      font-size: 0.92rem;
      font-weight: 600;
    }

    .guide-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 24px 20px;
      box-shadow: var(--shadow);
    }

    .guide-list {
      margin: 0;
      padding-left: 1.2em;
      color: var(--text);
    }

    .guide-list li {
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .guide-list li:last-child { margin-bottom: 0; }

    .guide-footnote {
      margin: 20px 0 0;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.92rem;
    }

    footer {
      margin-top: 64px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    footer nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px 24px;
      margin-bottom: 16px;
    }

    footer nav a { font-weight: 600; }

    footer .contact { margin-top: 12px; }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(5, 10, 18, 0.92);
      backdrop-filter: blur(6px);
    }

    .lightbox[hidden] { display: none; }

    .lightbox-panel {
      position: relative;
      max-width: min(420px, 100%);
      max-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .lightbox-panel.is-video {
      max-width: min(960px, 100%);
      width: 100%;
    }

    .lightbox-media {
      max-height: calc(100vh - 120px);
      overflow: auto;
      border-radius: 12px;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5);
    }

    .lightbox-media img {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(100vh - 120px);
      object-fit: contain;
      border-radius: 12px;
    }

    .lightbox-media iframe,
    .lightbox-media video {
      display: block;
      width: min(960px, 100%);
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: 12px;
      background: #000;
    }

    .lightbox-caption {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    .lightbox-close,
    .lightbox-prev,
    .lightbox-next {
      position: fixed;
      border: 1px solid var(--border);
      background: rgba(15, 23, 36, 0.85);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      line-height: 1;
      transition: background 0.15s ease;
    }

    .lightbox-close:hover,
    .lightbox-prev:hover,
    .lightbox-next:hover {
      background: rgba(61, 143, 90, 0.35);
    }

    .lightbox-close {
      top: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      font-size: 1.6rem;
    }

    .lightbox-prev,
    .lightbox-next {
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      font-size: 1.8rem;
    }

    .lightbox-prev { left: 12px; }
    .lightbox-next { right: 12px; }

    .lightbox-prev[hidden],
    .lightbox-next[hidden] { display: none; }

    @media (max-width: 600px) {
      .lightbox-prev { left: 4px; }
      .lightbox-next { right: 4px; }
    }
  </style>
</head>

          guideTitle: 'Kurzanleitung',
          guideSub: 'So startest du mit LifeKompas.',
          guideSteps: [

      var currentLang = 'en';
      var galleryEl = document.getElementById('gallery');
      var guideListEl = document.getElementById('guide-list');
      var guideFootnoteEl = document.getElementById('guide-footnote');
      var lightbox = document.getElementById('lightbox');
      var panel = document.getElementById('lightbox-panel');
      var media = document.getElementById('lightbox-media');
      var caption = document.getElementById('lightbox-caption');
      var btnClose = lightbox.querySelector('.lightbox-close');
      var btnPrev = lightbox.querySelector('.lightbox-prev');
      var btnNext = lightbox.querySelector('.lightbox-next');
      var lightboxItems = [];
      var lightboxIndex = 0;

      function detectLang() {
        var saved = localStorage.getItem(LANG_KEY);
        if (saved && LANGS.indexOf(saved) !== -1) return saved;
        var nav = (navigator.language || 'en').slice(0, 2).toLowerCase();
        if (LANGS.indexOf(nav) !== -1) return nav;
        return 'en';
      }

      function t(key) {
        return PACK[currentLang][key];
      }

      function shotPath(file) {
        return 'assets/screenshots/' + currentLang + '/' + file;
      }

      function applyTexts() {
        var pack = PACK[currentLang];
        document.documentElement.lang = currentLang;
        document.querySelector('meta[name="description"]').setAttribute('content', pack.metaDescription);
        lightbox.setAttribute('aria-label', pack.lightboxDialog);

        document.querySelectorAll('[data-i18n]').forEach(function (el) {
          var key = el.getAttribute('data-i18n');
          if (pack[key] != null) el.textContent = pack[key];
        });

        document.querySelectorAll('[data-i18n-aria]').forEach(function (el) {
          var key = el.getAttribute('data-i18n-aria');
          if (pack[key] != null) el.setAttribute('aria-label', pack[key]);
        });

        document.getElementById('link-privacy').href = pack.privacyHref;
        document.getElementById('link-terms').href = pack.termsHref;

        document.querySelectorAll('.lang-picker button').forEach(function (btn) {
          btn.classList.toggle('is-active', btn.getAttribute('data-lang') === currentLang);
        });

        buildGuide();
      }

      function buildGuide() {
        var pack = PACK[currentLang];
        guideListEl.innerHTML = '';
        (pack.guideSteps || []).forEach(function (step) {
          var li = document.createElement('li');
          li.textContent = step;
          guideListEl.appendChild(li);
        });
        guideFootnoteEl.textContent = pack.guideFootnote || '';
      }

      function buildGallery() {
        var pack = PACK[currentLang];
        galleryEl.innerHTML = '';
        lightboxItems = [];

        SHOTS.forEach(function (shot, i) {
          var meta = pack[shot.key];
          var fig = document.createElement('figure');
          fig.className = 'shot';

          var img = document.createElement('img');
          img.src = shotPath(shot.file);
          img.alt = meta.alt;
          img.loading = i < 4 ? 'eager' : 'lazy';
          img.width = 390;
          img.height = 844;

          var cap = document.createElement('figcaption');
          var strong = document.createElement('strong');
          strong.textContent = meta.title;
          cap.appendChild(strong);
          cap.appendChild(document.createTextNode(meta.desc));

          fig.appendChild(img);
          fig.appendChild(cap);
          galleryEl.appendChild(fig);

          lightboxItems.push({
            type: 'image',
            src: shotPath(shot.file),
            alt: meta.alt,
            label: meta.title
          });

          img.setAttribute('role', 'button');
          img.setAttribute('tabindex', '0');
          img.setAttribute('aria-label', pack.enlarge + ': ' + meta.alt);
          img.addEventListener('click', function () { openLightbox(i); });
          img.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              openLightbox(i);
            }
          });
        });
      }

      function appendVideoLightboxItems() {
        var pack = PACK[currentLang];
        document.querySelectorAll('.video-slot.has-video').forEach(function (slot) {
          var iframe = slot.querySelector('iframe');
          var video = slot.querySelector('video');
          var labelEl = slot.querySelector('.placeholder-label');
          var label = labelEl ? labelEl.textContent : 'Demo video';
          var itemIndex = lightboxItems.length;
          var item = { type: 'video', label: label };
          if (iframe) {
            item.embedSrc = iframe.src;
          } else if (video) {
            var source = video.querySelector('source');
            item.videoSrc = source ? source.src : video.currentSrc || video.src;
            item.poster = video.poster || '';
          } else {
            return;
          }
          lightboxItems.push(item);
          slot.setAttribute('role', 'button');
          slot.setAttribute('tabindex', '0');
          slot.setAttribute('aria-label', pack.enlarge + ': ' + label);
          slot.onclick = function () { openLightbox(itemIndex); };
          slot.onkeydown = function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              openLightbox(itemIndex);
            }
          };
        });
      }

      function setLang(lang) {
        if (LANGS.indexOf(lang) === -1) return;
        currentLang = lang;
        localStorage.setItem(LANG_KEY, lang);
        applyTexts();
        buildGallery();
        appendVideoLightboxItems();
      }

      function renderLightbox() {
        var item = lightboxItems[lightboxIndex];
        media.innerHTML = '';
        caption.textContent = item.label || '';
        panel.classList.toggle('is-video', item.type === 'video');

        if (item.type === 'image') {
          var img = document.createElement('img');
          img.src = item.src;
          img.alt = item.alt;
          media.appendChild(img);
        } else if (item.embedSrc) {
          var frame = document.createElement('iframe');
          frame.src = item.embedSrc;
          frame.title = item.label || 'Video';
          frame.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
          frame.allowFullscreen = true;
          media.appendChild(frame);
        } else if (item.videoSrc) {
          var vid = document.createElement('video');
          vid.controls = true;
          vid.autoplay = true;
          if (item.poster) vid.poster = item.poster;
          var src = document.createElement('source');
          src.src = item.videoSrc;
          src.type = 'video/mp4';
          vid.appendChild(src);
          media.appendChild(vid);
        }

        var showNav = lightboxItems.length > 1 && lightboxItems.every(function (i) { return i.type === 'image'; });
        btnPrev.hidden = !showNav;
        btnNext.hidden = !showNav;
      }

      function openLightbox(i) {
        if (!lightboxItems.length) return;
        lightboxIndex = i;
        renderLightbox();
        lightbox.hidden = false;
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        btnClose.focus();
      }

      function closeLightbox() {
        lightbox.hidden = true;
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        media.innerHTML = '';
      }

      function stepLightbox(delta) {
        lightboxIndex = (lightboxIndex + delta + lightboxItems.length) % lightboxItems.length;
        renderLightbox();
      }

      document.querySelectorAll('.lang-picker button').forEach(function (btn) {
        btn.addEventListener('click', function () {
          setLang(btn.getAttribute('data-lang'));
        });
      });

      btnClose.addEventListener('click', closeLightbox);
      btnPrev.addEventListener('click', function () { stepLightbox(-1); });
      btnNext.addEventListener('click', function () { stepLightbox(1); });
      lightbox.addEventListener('click', function (e) {
        if (e.target === lightbox) closeLightbox();
      });
      document.addEventListener('keydown', function (e) {
        if (lightbox.hidden) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft' && !btnPrev.hidden) stepLightbox(-1);
        if (e.key === 'ArrowRight' && !btnNext.hidden) stepLightbox(1);
      });

      setLang(detectLang());
    })();
  </script>
