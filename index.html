<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="LifeKompas — offline personal organizer: obligations, shopping, finances, health, diary and more.">
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">
  <title>LifeKompas</title>
  <style>
    :root {
      --bg: #1e3d52;
      --bg-deep: #173445;
      --bg-elevated: rgba(255, 255, 255, 0.08);
      --bg-card: rgba(255, 255, 255, 0.09);
      --border: rgba(255, 255, 255, 0.14);
      --text: #f4f8fc;
      --muted: #b8c9d8;
      --accent: #45a068;
      --accent-light: #8fd4a8;
      --accent-soft: rgba(69, 160, 104, 0.22);
      --radius: 18px;
      --shadow: 0 12px 36px rgba(12, 40, 58, 0.28);
      --header-h: 58px;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      overflow-x: clip;
    }

    body {
      margin: 0;
      overflow-x: clip;
      max-width: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      color: var(--text);
      line-height: 1.55;
      background-color: var(--bg-deep);
      background-image:
        radial-gradient(ellipse 110% 70% at 50% -15%, rgba(120, 190, 230, 0.28), transparent 52%),
        radial-gradient(ellipse 85% 55% at 95% 85%, rgba(69, 160, 104, 0.22), transparent 48%),
        radial-gradient(ellipse 70% 45% at 5% 95%, rgba(80, 150, 120, 0.16), transparent 42%),
        linear-gradient(180deg, #255570 0%, #1e4558 38%, #1a3d50 100%);
      background-attachment: fixed;
    }

    a { color: var(--accent-light); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 200;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      background: rgba(23, 52, 69, 0.78);
      border-bottom: 1px solid var(--border);
    }

    .site-header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: var(--header-h);
    }

    .site-logo {
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .site-logo:hover { text-decoration: none; opacity: 0.9; }

    .lang-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .lang-picker button {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .lang-picker button:hover {
      color: var(--text);
      border-color: rgba(61, 143, 90, 0.45);
    }

    .lang-picker button.is-active {
      background: var(--accent-soft);
      border-color: rgba(61, 143, 90, 0.55);
      color: #b8e6c8;
      font-weight: 600;
    }

    .hero-banner {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    .hero-banner::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("assets/hero-bg.jpg") center 30% / cover no-repeat;
      transform: scale(1.06);
      filter: blur(1px);
    }

    .hero-banner::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 20%, rgba(100, 190, 140, 0.2), transparent 60%),
        linear-gradient(180deg, rgba(20, 50, 68, 0.45) 0%, rgba(26, 61, 80, 0.72) 55%, rgba(26, 61, 80, 0) 100%);
    }

    .hero-layout {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 20px 64px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      align-items: center;
    }

    @media (min-width: 860px) {
      .hero-layout {
        grid-template-columns: 1.05fr 0.95fr;
        padding: 72px 20px 80px;
      }
    }

    .hero-copy { text-align: center; }

    @media (min-width: 860px) {
      .hero-copy { text-align: left; }
    }

    .hero-copy h1 {
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      margin: 0 0 16px;
      letter-spacing: -0.03em;
      line-height: 1.08;
    }

    .hero-copy .tagline {
      font-size: clamp(1.05rem, 2.5vw, 1.2rem);
      color: #c8d3e0;
      max-width: 34rem;
      margin: 0 auto;
    }

    @media (min-width: 860px) {
      .hero-copy .tagline { margin: 0; }
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-top: 24px;
    }

    @media (min-width: 860px) {
      .hero-actions { justify-content: flex-start; }
    }

    .hero .pill {
      display: inline-block;
      padding: 9px 16px;
      border-radius: 999px;
      background: var(--accent-soft);
      border: 1px solid rgba(61, 143, 90, 0.35);
      color: #b8e6c8;
      font-size: 0.88rem;
      font-weight: 600;
    }

    .hero-store-soon {
      margin: 14px 0 0;
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--muted);
      text-align: center;
    }

    @media (min-width: 860px) {
      .hero-store-soon { text-align: left; }
    }

    .hero-guide-link {
      display: inline-flex;
      align-items: center;
      padding: 9px 16px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      transition: border-color 0.15s ease, background 0.15s ease;
    }

    .hero-guide-link:hover {
      text-decoration: none;
      border-color: rgba(61, 143, 90, 0.45);
      background: rgba(61, 143, 90, 0.12);
    }

    @media (max-width: 859px) {
      .hero-guide-link { display: none; }
    }

    .hero-phone {
      justify-self: center;
      width: min(100%, 260px);
      filter: drop-shadow(0 24px 48px rgba(0, 0, 0, 0.45));
    }

    .hero-phone .phone-shell {
      padding: 12px 12px 0;
      background: linear-gradient(165deg, #3a4658 0%, #1e2836 100%);
      border-radius: 34px 34px 0 0;
      border: 2px solid rgba(255, 255, 255, 0.14);
      border-bottom: none;
    }

    .hero-phone .phone-notch {
      width: 38%;
      height: 5px;
      margin: 0 auto 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
    }

    .hero-phone img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 22px 22px 0 0;
    }

    .hero-copy,
    .hero-phone {
      animation: heroIn 0.65s ease both;
      animation-delay: 0.1s;
    }

    @media (max-width: 859px) {
      .hero-layout {
        padding: 32px 16px 36px;
        gap: 20px;
      }

      .hero-copy h1 {
        font-size: clamp(1.85rem, 8vw, 2.4rem);
        margin-bottom: 12px;
      }

      .hero-copy .tagline {
        font-size: 1rem;
      }

      .hero-actions {
        margin-top: 16px;
      }

      .hero-phone {
        width: min(100%, 190px);
        filter: drop-shadow(0 16px 32px rgba(0, 0, 0, 0.38));
      }

      section {
        margin-top: 40px;
      }

      .section-head .sub {
        margin-bottom: 20px;
      }

      .wrap {
        padding-bottom: 48px;
      }

      footer {
        margin-top: 48px;
        padding: 24px 18px;
      }
    }

    @keyframes heroIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 8px 20px 72px;
      position: relative;
      overflow-x: clip;
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 28px 28px 0 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04) 0%, transparent 120px);
      pointer-events: none;
    }

    section {
      margin-top: 56px;
      position: relative;
    }

    .section-head h2 {
      font-size: clamp(1.35rem, 3vw, 1.65rem);
      margin: 0 0 8px;
      letter-spacing: -0.02em;
      color: #f8fbfe;
    }

    .section-head .sub {
      color: var(--muted);
      margin: 0 0 28px;
      font-size: 0.96rem;
      max-width: 42rem;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .video-slot {
      aspect-ratio: 16 / 9;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-card);
      overflow: hidden;
      cursor: zoom-in;
    }

    .video-slot iframe,
    .video-slot video {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border-radius: 14px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.12), rgba(120, 180, 150, 0.06));
      border: 1px solid rgba(255, 255, 255, 0.15);
      font-size: 0.94rem;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .feature:hover {
      transform: translateY(-2px);
      border-color: rgba(143, 212, 168, 0.45);
      box-shadow: 0 10px 28px rgba(12, 40, 58, 0.22);
    }

    .feature-icon {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: var(--accent-soft);
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .guide-card {
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.11), rgba(100, 170, 140, 0.07));
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: var(--radius);
      padding: 28px 28px 22px;
      box-shadow: var(--shadow);
    }

    .guide-list {
      margin: 0;
      padding-left: 1.15em;
      color: var(--text);
    }

    .guide-list li {
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .guide-list li:last-child { margin-bottom: 0; }

    .guide-footnote {
      margin: 22px 0 0;
      padding-top: 18px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.92rem;
    }

    .guide-details summary {
      list-style: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.11), rgba(100, 170, 140, 0.07));
      color: var(--text);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .guide-details summary::-webkit-details-marker { display: none; }

    .guide-details summary::after {
      content: "▾";
      color: var(--accent-light);
      font-size: 1.1rem;
      transition: transform 0.2s ease;
    }

    .guide-details[open] summary {
      margin-bottom: 14px;
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .guide-details[open] summary::after {
      transform: rotate(180deg);
    }

    .guide-details .guide-card {
      border-top-left-radius: 0;
      border-top-right-radius: 0;
    }

    @media (min-width: 900px) {
      .guide-details summary { display: none; }

      .guide-details .guide-card {
        border-radius: var(--radius);
      }
    }

    .gallery-hint {
      display: none;
      margin: 0 0 14px;
      font-size: 0.88rem;
      color: var(--muted);
      text-align: center;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 28px;
      justify-items: center;
    }

    @media (min-width: 900px) {
      .gallery {
        grid-template-columns: repeat(4, 220px);
        justify-content: center;
      }
    }

    @media (max-width: 899px) {
      .gallery-hint {
        display: block;
      }

      #modules {
        display: none;
      }

      .gallery-scroll {
        overflow-x: auto;
        overscroll-behavior-x: none;
        -webkit-overflow-scrolling: touch;
        scroll-snap-type: x mandatory;
        max-width: 100%;
        margin: 0;
        padding: 2px 0 14px;
      }

      .gallery {
        display: flex;
        flex-wrap: nowrap;
        align-items: stretch;
        gap: 14px;
        overflow: visible;
        padding: 0 14px;
        padding-inline-end: max(14px, calc(100% - min(68vw, 188px)));
        margin: 0;
        justify-content: flex-start;
        width: max-content;
        box-sizing: border-box;
      }

      .gallery .shot {
        flex: 0 0 min(68vw, 188px);
        max-width: none;
        scroll-snap-align: start;
        scroll-snap-stop: always;
      }

      .features {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .feature {
        padding: 12px 12px;
        font-size: 0.86rem;
        gap: 10px;
      }

      .feature-icon {
        width: 36px;
        height: 36px;
        font-size: 1.05rem;
        border-radius: 10px;
      }
    }

    .shot {
      width: 100%;
      max-width: 220px;
      background: linear-gradient(165deg, #4a6278 0%, #334958 100%);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .shot:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 40px rgba(12, 40, 58, 0.32);
    }

    .phone-frame {
      padding: 10px 10px 0;
    }

    .phone-frame::before {
      content: "";
      display: block;
      width: 36%;
      height: 4px;
      margin: 0 auto 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
    }

    .phone-frame img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 18px 18px 0 0;
      cursor: zoom-in;
    }

    .shot figcaption {
      padding: 12px 14px 14px;
      font-size: 0.82rem;
      color: var(--muted);
      background: rgba(26, 61, 80, 0.35);
    }

    .shot figcaption strong {
      display: block;
      color: var(--text);
      font-size: 0.9rem;
      margin-bottom: 2px;
    }

    footer {
      margin-top: 72px;
      padding: 32px 24px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: var(--radius);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.1), rgba(90, 160, 130, 0.08));
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      box-shadow: var(--shadow);
    }

    footer nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px 28px;
      margin-bottom: 16px;
    }

    footer nav a { font-weight: 600; }

    footer .contact { margin-top: 12px; }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .reveal.is-visible {
      opacity: 1;
      transform: none;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      padding-top: calc(16px + env(safe-area-inset-top, 0px));
      padding-bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      background: rgba(5, 10, 18, 0.92);
      backdrop-filter: blur(8px);
      touch-action: manipulation;
    }

    .lightbox[hidden] { display: none; }

    .lightbox-panel {
      position: relative;
      z-index: 1001;
      max-width: min(420px, 100%);
      max-height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      align-items: center;
      pointer-events: none;
    }

    .lightbox-panel .lightbox-media,
    .lightbox-panel .lightbox-caption {
      pointer-events: auto;
    }

    .lightbox-panel.is-video {
      max-width: min(960px, 100%);
      width: 100%;
    }

    .lightbox-media {
      max-height: calc(100vh - 120px);
      overflow: auto;
      border-radius: 16px;
      box-shadow: 0 16px 56px rgba(0, 0, 0, 0.55);
    }

    .lightbox-media img {
      display: block;
      width: 100%;
      height: auto;
      max-height: calc(100vh - 120px);
      object-fit: contain;
      border-radius: 16px;
    }

    .lightbox-media iframe,
    .lightbox-media video {
      display: block;
      width: min(960px, 100%);
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: 12px;
      background: #000;
    }

    .lightbox-caption {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    .lightbox-close,
    .lightbox-prev,
    .lightbox-next {
      position: fixed;
      z-index: 1010;
      border: 1px solid var(--border);
      background: rgba(15, 23, 36, 0.92);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
      line-height: 1;
      transition: background 0.15s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .lightbox-close:hover,
    .lightbox-prev:hover,
    .lightbox-next:hover {
      background: rgba(61, 143, 90, 0.35);
    }

    .lightbox-close {
      top: calc(12px + env(safe-area-inset-top, 0px));
      right: calc(12px + env(safe-area-inset-right, 0px));
      width: 48px;
      height: 48px;
      font-size: 1.75rem;
    }

    .lightbox-prev,
    .lightbox-next {
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      font-size: 1.8rem;
    }

    .lightbox-prev { left: 12px; }
    .lightbox-next { right: 12px; }

    .lightbox-prev[hidden],
    .lightbox-next[hidden] { display: none; }

    .lightbox-mobile-bar {
      display: none;
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1015;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
      background: rgba(8, 18, 28, 0.96);
      border-top: 1px solid var(--border);
      touch-action: manipulation;
    }

    .lightbox-mobile-bar button {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border-radius: 12px;
      min-height: 44px;
      padding: 0 16px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .lightbox-mobile-bar .lb-step {
      width: 48px;
      padding: 0;
      font-size: 1.5rem;
      line-height: 1;
    }

    .lightbox-mobile-bar .lb-close {
      flex: 1;
      max-width: 160px;
      background: rgba(69, 160, 104, 0.25);
      border-color: rgba(143, 212, 168, 0.4);
    }

    .lightbox-mobile-bar .lb-counter {
      min-width: 3.2rem;
      text-align: center;
      font-size: 0.88rem;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 899px) {
      .lightbox {
        padding-bottom: calc(72px + env(safe-area-inset-bottom, 0px));
      }

      .lightbox-mobile-bar {
        display: flex;
      }

      .lightbox-prev,
      .lightbox-next {
        display: none !important;
      }

      .lightbox-panel {
        max-height: calc(100vh - 120px - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
      }

      .lightbox-media {
        max-height: calc(100vh - 160px - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
      }
    }

    @media (max-width: 600px) {
      .lightbox-prev { left: 4px; }
      .lightbox-next { right: 4px; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .hero-copy,
      .hero-phone {
        animation: none;
      }
      .reveal {
        opacity: 1;
        transform: none;
        transition: none;
      }
      .feature:hover,
      .shot:hover {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a href="#top" class="site-logo">LifeKompas</a>
      <nav class="lang-picker" aria-label="Language">
        <button type="button" data-lang="en">English</button>
        <button type="button" data-lang="hr">Hrvatski</button>
        <button type="button" data-lang="de">Deutsch</button>
      </nav>
    </div>
  </header>

  <div class="hero-banner hero" id="top">
    <div class="hero-layout">
      <div class="hero-copy">
        <h1>LifeKompas</h1>
        <p class="tagline" data-i18n="tagline"></p>

      function detectLang() {
        var saved = localStorage.getItem(LANG_KEY);
        if (saved && LANGS.indexOf(saved) !== -1) return saved;
        var nav = (navigator.language || 'en').slice(0, 2).toLowerCase();

        return 'assets/screenshots/' + currentLang + '/' + file;
      }

      function applyTexts() {
        var pack = PACK[currentLang];
        document.documentElement.lang = currentLang;
        document.querySelector('meta[name="description"]').setAttribute('content', pack.metaDescription);
        lightbox.setAttribute('aria-label', pack.lightboxDialog);

        document.querySelectorAll('[data-i18n]').forEach(function (el) {
          var key = el.getAttribute('data-i18n');
          if (pack[key] != null) el.textContent = pack[key];
        });

        document.querySelectorAll('[data-i18n-aria]').forEach(function (el) {
          var key = el.getAttribute('data-i18n-aria');
          if (pack[key] != null) el.setAttribute('aria-label', pack[key]);
        });

        document.getElementById('link-privacy').href = pack.privacyHref;
        document.getElementById('link-terms').href = pack.termsHref;

        document.querySelectorAll('.lang-picker button').forEach(function (btn) {
          btn.classList.toggle('is-active', btn.getAttribute('data-lang') === currentLang);
        });

        if (lbMobileClose && pack.lightboxCloseLabel) {
          lbMobileClose.textContent = pack.lightboxCloseLabel;
        }

        buildGuide();
        updateGuideSummaryLabel();
        updateHeroShot();
        buildVideos();
      }

      function updateHeroShot() {
        if (!heroShotEl) return;
        var pack = PACK[currentLang];
        heroShotEl.src = shotPath('02-home.png');
        heroShotEl.alt = pack.shot02.alt;
      }

      function syncVideoSection() {
        var hasContent = false;
        document.querySelectorAll('.video-slot').forEach(function (slot) {
          var media = slot.querySelector('iframe, video');
          slot.classList.toggle('has-video', !!media);
          slot.hidden = !media;
          if (media) hasContent = true;
        });
        if (videosSection) videosSection.hidden = !hasContent;
      }

      function buildVideos() {
        var pack = PACK[currentLang];
        var entries = VIDEOS[currentLang] || VIDEOS.en || [];
        var slots = [
          document.getElementById('video-slot-1'),
          document.getElementById('video-slot-2'),
          document.getElementById('video-slot-3')
        ];

        slots.forEach(function (slot, index) {
          if (!slot) return;
          slot.innerHTML = '';
          slot.classList.remove('has-video');
          slot.hidden = true;
          slot.removeAttribute('role');
          slot.removeAttribute('tabindex');
          slot.removeAttribute('aria-label');
          slot.onclick = null;
          slot.onkeydown = null;

          var entry = entries[index];
          if (!entry || !entry.file) return;

          var video = document.createElement('video');
          video.controls = true;
          video.playsInline = true;
          video.preload = 'metadata';
          video.setAttribute('playsinline', '');
          video.setAttribute('webkit-playsinline', '');
          video.setAttribute('aria-label', pack[entry.labelKey] || 'Demo video');

          var source = document.createElement('source');
          source.src = 'assets/videos/' + entry.file;
          source.type = 'video/mp4';
          video.appendChild(source);

          var label = document.createElement('span');
          label.className = 'placeholder-label';
          label.hidden = true;
          label.textContent = pack[entry.labelKey] || 'Demo video';
          slot.appendChild(video);
          slot.appendChild(label);
          slot.hidden = false;
        });

        syncVideoSection();
      }

      function buildGuide() {
        var pack = PACK[currentLang];
        guideListEl.innerHTML = '';
        (pack.guideSteps || []).forEach(function (step) {
          var li = document.createElement('li');
          li.textContent = step;
          guideListEl.appendChild(li);
        });
        guideFootnoteEl.textContent = pack.guideFootnote || '';
      }

      function updateGuideSummaryLabel() {
        if (!guideDetailsEl || !guideSummaryEl) return;
        if (window.matchMedia('(min-width: 900px)').matches) return;
        var pack = PACK[currentLang];
        guideSummaryEl.textContent = guideDetailsEl.hasAttribute('open')
          ? (pack.guideCollapse || 'Close quick guide')
          : (pack.guideExpand || 'Open quick guide');
      }

      function clampGalleryScroll() {
        var scroller = document.querySelector('.gallery-scroll');
        if (!scroller || window.matchMedia('(min-width: 900px)').matches) return;
        var max = Math.max(0, scroller.scrollWidth - scroller.clientWidth);
        if (scroller.scrollLeft > max) scroller.scrollLeft = max;
        if (scroller.scrollLeft < 0) scroller.scrollLeft = 0;
      }

      function bindGalleryScrollClamp() {
        var scroller = document.querySelector('.gallery-scroll');
        if (!scroller || scroller.dataset.clampBound === '1') return;
        scroller.dataset.clampBound = '1';
        scroller.addEventListener('scroll', clampGalleryScroll, { passive: true });
        scroller.addEventListener('scrollend', clampGalleryScroll, { passive: true });
      }

      function buildGallery() {
        var pack = PACK[currentLang];
        galleryEl.innerHTML = '';
        lightboxItems = [];

        SHOTS.forEach(function (shot, i) {
          var meta = pack[shot.key];
          var fig = document.createElement('figure');
          fig.className = 'shot';

          var frame = document.createElement('div');
          frame.className = 'phone-frame';

          var img = document.createElement('img');
          img.src = shotPath(shot.file);
          img.alt = meta.alt;
          img.loading = 'eager';
          img.decoding = 'async';
          img.width = 390;
          img.height = 844;

          var cap = document.createElement('figcaption');
          var strong = document.createElement('strong');
          strong.textContent = meta.title;
          cap.appendChild(strong);
          cap.appendChild(document.createTextNode(meta.desc));

          frame.appendChild(img);
          fig.appendChild(frame);
          fig.appendChild(cap);
          galleryEl.appendChild(fig);

          lightboxItems.push({
            type: 'image',
            src: shotPath(shot.file),
            alt: meta.alt,
            label: meta.title
          });

          img.setAttribute('role', 'button');
          img.setAttribute('tabindex', '0');
          img.setAttribute('aria-label', pack.enlarge + ': ' + meta.alt);
          img.addEventListener('click', function () { openLightbox(i); });
          img.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              openLightbox(i);
            }
          });
        });
        clampGalleryScroll();
      }

      function appendVideoLightboxItems() {
        var pack = PACK[currentLang];
        document.querySelectorAll('.video-slot.has-video').forEach(function (slot) {
          var iframe = slot.querySelector('iframe');
          var video = slot.querySelector('video');
          var labelEl = slot.querySelector('.placeholder-label');
          var label = labelEl ? labelEl.textContent : 'Demo video';
          var itemIndex = lightboxItems.length;
          var item = { type: 'video', label: label };
          if (iframe) {
            item.embedSrc = iframe.src;
          } else if (video) {
            var source = video.querySelector('source');
            item.videoSrc = source ? source.src : video.currentSrc || video.src;
            item.poster = video.poster || '';
          } else {
            return;
          }
          lightboxItems.push(item);
          slot.setAttribute('role', 'button');
          slot.setAttribute('tabindex', '0');
          slot.setAttribute('aria-label', pack.enlarge + ': ' + label);
          slot.onclick = function () { openLightbox(itemIndex); };
          slot.onkeydown = function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              openLightbox(itemIndex);
            }
          };
        });
      }

      function setLang(lang) {
        if (LANGS.indexOf(lang) === -1) return;
        currentLang = lang;
        localStorage.setItem(LANG_KEY, lang);
        applyTexts();
        buildGallery();
        appendVideoLightboxItems();
      }

      function renderLightbox() {
        var item = lightboxItems[lightboxIndex];
        media.innerHTML = '';
        caption.textContent = item.label || '';
        panel.classList.toggle('is-video', item.type === 'video');

        if (item.type === 'image') {
          var img = document.createElement('img');
          img.src = item.src;
          img.alt = item.alt;
          media.appendChild(img);
        } else if (item.embedSrc) {
          var frame = document.createElement('iframe');
          frame.src = item.embedSrc;
          frame.title = item.label || 'Video';
          frame.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
          frame.allowFullscreen = true;
          media.appendChild(frame);
        } else if (item.videoSrc) {
          var vid = document.createElement('video');
          vid.controls = true;
          vid.autoplay = true;
          if (item.poster) vid.poster = item.poster;
          var src = document.createElement('source');
          src.src = item.videoSrc;
          src.type = 'video/mp4';
          vid.appendChild(src);
          media.appendChild(vid);
        }

        var showNav = lightboxItems.length > 1 && lightboxItems.every(function (i) { return i.type === 'image'; });
        btnPrev.hidden = !showNav;
        btnNext.hidden = !showNav;
        if (lbMobilePrev) lbMobilePrev.hidden = !showNav;
        if (lbMobileNext) lbMobileNext.hidden = !showNav;
        if (lbMobileCounter) {
          lbMobileCounter.textContent = showNav
            ? (lightboxIndex + 1) + ' / ' + lightboxItems.length
            : '';
        }
      }

      function openLightbox(i) {
        if (!lightboxItems.length) return;
        lightboxIndex = i;
        renderLightbox();
        lightbox.hidden = false;
        lightbox.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
        btnClose.focus();
      }

      function closeLightbox() {
        lightbox.hidden = true;
        lightbox.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
        media.innerHTML = '';
      }

      function stepLightbox(delta) {
        lightboxIndex = (lightboxIndex + delta + lightboxItems.length) % lightboxItems.length;
        renderLightbox();
      }

      document.querySelectorAll('.lang-picker button').forEach(function (btn) {
        btn.addEventListener('click', function () {
          setLang(btn.getAttribute('data-lang'));
        });
      });

      btnClose.addEventListener('click', closeLightbox);
      btnPrev.addEventListener('click', function () { stepLightbox(-1); });
      btnNext.addEventListener('click', function () { stepLightbox(1); });
      if (lbMobileClose) lbMobileClose.addEventListener('click', closeLightbox);
      if (lbMobilePrev) lbMobilePrev.addEventListener('click', function () { stepLightbox(-1); });
      if (lbMobileNext) lbMobileNext.addEventListener('click', function () { stepLightbox(1); });
      lightbox.addEventListener('click', function (e) {
        if (e.target === lightbox) closeLightbox();
      });
      lightbox.addEventListener('touchstart', function (e) {
        if (lightbox.hidden || e.touches.length !== 1) return;
        lightboxTouchStartX = e.touches[0].clientX;
        lightboxTouchStartY = e.touches[0].clientY;
      }, { passive: true });
      lightbox.addEventListener('touchend', function (e) {
        if (lightbox.hidden || btnPrev.hidden) return;
        var t = e.changedTouches[0];
        var dx = t.clientX - lightboxTouchStartX;
        var dy = t.clientY - lightboxTouchStartY;
        if (Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;
        if (dx < 0) stepLightbox(1);
        else stepLightbox(-1);
      }, { passive: true });
      document.addEventListener('keydown', function (e) {
        if (lightbox.hidden) return;
        if (e.key === 'Escape') closeLightbox();
        if (e.key === 'ArrowLeft' && !btnPrev.hidden) stepLightbox(-1);
        if (e.key === 'ArrowRight' && !btnNext.hidden) stepLightbox(1);
      });

      function initGuideDetails() {
        if (!guideDetailsEl) return;
        if (window.matchMedia('(min-width: 900px)').matches) {
          guideDetailsEl.setAttribute('open', '');
          return;
        }
        if (location.hash === '#guide') {
          guideDetailsEl.setAttribute('open', '');
        } else {
          guideDetailsEl.removeAttribute('open');
        }
        updateGuideSummaryLabel();
      }

      function openGuideFromHash() {
        if (location.hash === '#guide' && guideDetailsEl) {
          guideDetailsEl.setAttribute('open', '');
          updateGuideSummaryLabel();
        }
      }

      if (guideDetailsEl) {
        guideDetailsEl.addEventListener('toggle', updateGuideSummaryLabel);
      }

      var heroGuideLink = document.querySelector('.hero-guide-link');
      if (heroGuideLink) {
        heroGuideLink.addEventListener('click', function () {
          if (guideDetailsEl) {
            guideDetailsEl.setAttribute('open', '');
            updateGuideSummaryLabel();
          }
        });
      }

      window.matchMedia('(min-width: 900px)').addEventListener('change', function (e) {
        if (guideDetailsEl && e.matches) {
          guideDetailsEl.setAttribute('open', '');
        }
        updateGuideSummaryLabel();
      });

      function initReveal() {
        var reveals = document.querySelectorAll('.reveal');
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          reveals.forEach(function (el) { el.classList.add('is-visible'); });
          return;
        }
        if (!('IntersectionObserver' in window)) {
          reveals.forEach(function (el) { el.classList.add('is-visible'); });
          return;
        }
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.02, rootMargin: '0px 0px 8% 0px' });
        reveals.forEach(function (el) { observer.observe(el); });
      }

      setLang(detectLang());
      initGuideDetails();
      openGuideFromHash();
      bindGalleryScrollClamp();
      window.addEventListener('hashchange', openGuideFromHash);
      initReveal();
    })();
  </script>
</body>
</html>
